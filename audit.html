<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardce Stats Audit</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="audit-canvas">
      <section class="screen-root stats-page">
        <header class="stats-top-bar"><div class="stats-title-cluster"><h1>统计分析</h1><p>这个月赚到了多少，一眼看懂</p></div></header>
        <section class="stats-hero" aria-label="本月返现摘要"><span class="stats-aura stats-aura-liquid"></span><span class="stats-aura stats-aura-achievement"></span><p class="hero-label">本月总 cashback</p><strong class="hero-amount">HKD 486</strong><p class="hero-milestone">年度 cashback 已突破<br />HKD 3,000</p><p class="hero-comparison">比上月 +12.4% · 表现很漂亮</p><div class="stat-pill annual-pill"><span>年度累计</span><b>HKD 3,182</b></div><div class="stat-pill rate-pill"><span>平均返现率</span><b>2.61%</b></div><div class="emoji-glow"></div><div class="emoji-face"><span class="emoji-eye eye-left"></span><span class="emoji-eye eye-right"></span><span class="emoji-mouth">⌣</span></div><span class="spark sparkle-one"></span><span class="spark sparkle-two"></span><span class="spark sparkle-three"></span><div class="hero-popover"><b>Pulse Card 为你贡献了本月最多的 cashback。</b><span>再使用 HKD 540 餐饮额度，就能充分利用本月高返现。</span></div></section>
        <section class="stats-panel contribution-panel" aria-label="贡献来源"><h2>贡献来源</h2><div class="metric-row metric-card"><b>Pulse Card</b><strong>HKD 318</strong></div><div class="track card-track"><span></span></div><div class="metric-row metric-category"><b>餐饮与线上消费</b><strong>66%</strong></div><div class="track category-track"><span></span></div></section>
        <section class="stats-panel trend-panel" aria-label="月度趋势"><h2>月度趋势</h2><p>连续 3 个月提升，本月比上月多 HKD 54</p><strong class="milestone-badge">里程碑</strong><span class="milestone-dot"></span><span class="bar apr"></span><span class="bar may"></span><span class="bar jun"></span></section>
        <section class="stats-panel advice-panel" aria-label="行动建议"><h2>行动建议</h2><p>再使用 HKD 540 餐饮额度，就能充分利用本月高返现。</p></section>
        <nav class="dock" aria-label="底部导航"><span class="dock-active stats"></span><a href="/">首页</a><a class="active" href="/stats">统计</a></nav>
      </section>
    </main>
  </body>
</html>
